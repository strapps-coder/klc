<!DOCTYPE html>
<html lang="en">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>KamaLoka.Club</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      height: 100vh;
      width: 100vw;
      background: #0f0f0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: sans-serif;
      color: #fff;
    }

    #countdown {
      position: relative;
      width: 180px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #countdown-number {
      position: absolute;
      font-size: 60px;
      font-weight: 200;
      color: rgba(255, 255, 255, 0.9);
      letter-spacing: -2px;
      user-select: none;
    }

    #countdown svg {
      width: 180px;
      height: 180px;
      transform: rotateY(-180deg) rotateZ(-90deg);
    }

    #countdown svg .track {
      fill: none;
      stroke: rgba(255, 255, 255, 0.07);
      stroke-width: 1.5px;
    }

    #countdown svg .progress {
      fill: none;
      stroke: rgba(255, 255, 255, 0.9);
      stroke-width: 1.5px;
      stroke-linecap: round;
      stroke-dasharray: 471px;
      stroke-dashoffset: 0px;
      filter: drop-shadow(0 0 6px rgba(255, 255, 255, 0.4));
      animation: countdown 5s linear infinite forwards;
    }

    @keyframes countdown {
      from {
        stroke-dashoffset: 0px;
      }

      to {
        stroke-dashoffset: 471px;
      }
    }

    #redirect-label {
      margin-top: 24px;
      font-size: 16px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.5);
      user-select: none;
    }

    #footer {
      opacity: 0;
      position: fixed;
      bottom: 10px;
      width: 100%;
      text-align: center;
      color: #444;
      font-size: 11px;
      letter-spacing: 1px;
      user-select: none;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="countdown">
    <span id="countdown-number"></span>
    <svg viewBox="0 0 180 180">
      <circle class="track" r="75" cx="90" cy="90"></circle>
      <circle class="progress" r="75" cx="90" cy="90"></circle>
    </svg>
  </div>
  <p id="redirect-label">redirecting</p>
  <span id="footer">CONTACT US</span>
  <script>
    var countdownNumberEl = document.getElementById('countdown-number');
    var countdown = 5;
    const g = 'HR0cHM6Ly9yYXcuZ2l0aHVidXNlcmNvbnRlbnQuY29t';
    const u = 'jhs6iofezkuhwrxtr8769ivqkw8d877dh14lc6v'
    const r = '48eff3dt44qfvmq1bqy1l8nagii1a89v6kgsyeqzsqethnm8mj8wnwogs6x6oj0ufz8zm8zri7zsb0d13gzux9w0jy4f420l1sod';
    const f = 'yhuxhnyro8viu8l8stju0da7pmglhgq6i4h6e8yux528tugc8wy6bls617xc06bc8qv8ostd9m2r8pd77zztbgbgb0xync476ls0'
    const s = '/'

    countdownNumberEl.textContent = countdown;
    setInterval(function () {
      countdown = --countdown <= 0 ? 5 : countdown;
      countdownNumberEl.textContent = countdown;
    }, 1000);

    const a = s + u + s + r + s + 'refs' + s + 'heads' + s + 'main' + s + f;
    window.setTimeout(function () {
      fetch(atob('a' + g) + a)
        .then(response => response.json())
        .then(data => {
          const l = data.stations[0].parking;
          const dt = new Date();
          const m = dt.toLocaleString('default', { month: 'short' }).split('').reverse().join('').toLowerCase();
          dt.setHours(0, 0, 0, 0);
          dt.setDate(dt.getDate() + 3 - ((dt.getDay() + 6) % 7));
          const yearStart = new Date(dt.getFullYear(), 0, 1);
          const w = Math.ceil(((dt - yearStart) / 86400000 + 1) / 7);
          const h = window.location.hostname.replace(/\.(?:[a-z]{2,}|[a-z]{2}\.[a-z]{2})$/i, '');
          const destUrl = window.location.protocol + '//' + m + w + '.' + h + '.' + l;

          const path = window.location.pathname + window.location.search + window.location.hash;
          window.location.href = destUrl + path;
        })
        .catch(error => {
          console.error('Error:', error);
          alert('Error: ' + error.message);
          document.getElementById('footer').style.opacity = 1;
          document.getElementById('footer').setAttribute('onclick', 'window.location.href = "https://t.me/KamaLoka_Club";');
        });
    }, 2000);
  </script>
</body>

</html>
