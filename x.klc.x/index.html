<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>KamaLoka.Club</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #0f0f0f;
            color: #fff;
            font-family: sans-serif;
        }

        iframe {
            width: 100vw;
            height: 100vh;
            border: none;
            display: block;
        }

        #not-found {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            gap: 16px;
        }

        #not-found .code {
            font-size: 96px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -4px;
            line-height: 1;
        }

        #not-found .divider {
            width: 48px;
            height: 2px;
            background: #333;
        }

        #not-found .msg {
            font-size: 16px;
            color: #666;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        #not-found .home-btn {
            margin-top: 20px;
            padding: 10px 28px;
            background: transparent;
            border: 1px solid #333;
            color: #dadada;
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 2px;
            transition: border-color 0.2s, color 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        #not-found .home-btn:hover {
            border-color: #666;
            color: #fff;
        }

        #not-found .home-btn svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            flex-shrink: 0;
        }
    </style>
</head>

<body>
    <iframe id="frame" allowfullscreen></iframe>
    <div id="not-found">
        <div class="code">404</div>
        <div class="divider"></div>
        <div class="msg">Page Not Found</div>
        <button class="home-btn" id="home-btn">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
            </svg>
            Go Home
        </button>
    </div>
    <script>
        function deob(str) {
            const key = 'kmlkclb';
            const outer = str.replace(/-/g, '+').replace(/_/g, '/');
            const outerPadded = outer + '='.repeat((4 - outer.length % 4) % 4);
            const xored = atob(outerPadded);
            let inner = '';
            for (let i = 0; i < xored.length; i++)
                inner += String.fromCharCode(xored.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            const innerPadded = inner + '='.repeat((4 - inner.length % 4) % 4);
            return atob(innerPadded);
        }

        function obfuscate(str) {
            const key = 'kmlkclb';
            const inner = btoa(str).replace(/=+$/, '');
            let xored = '';
            for (let i = 0; i < inner.length; i++)
                xored += String.fromCharCode(inner.charCodeAt(i) ^ key.charCodeAt(i % key.length));
            return btoa(xored).replace(/=+$/, '').replace(/\+/g, '-').replace(/\//g, '_');
        }

        window.addEventListener('message', function (event) {
            if (event.data && event.data.url) {
                const newEncoded = obfuscate(event.data.url);
                history.replaceState(null, '', '#' + newEncoded);
            }
        });

        const params = window.location.hash.slice(1);
        const encoded = params.split('&')[0];

        function expectedPrefix() {
            const dt = new Date();
            const m = dt.toLocaleString('default', { month: 'short' }).split('').reverse().join('').toLowerCase();
            dt.setHours(0, 0, 0, 0);
            dt.setDate(dt.getDate() + 3 - ((dt.getDay() + 6) % 7));
            const yearStart = new Date(dt.getFullYear(), 0, 1);
            const w = Math.ceil(((dt - yearStart) / 86400000 + 1) / 7);
            return m + w;
        }

        function hp() {
            const parts = window.location.hostname.split('.');
            return window.location.protocol + '//' + parts[parts.length - 2] + '.' + 'c' + 'l' + 'u' + 'b';
        }

        function show404() {
            document.getElementById('frame').style.display = 'none';
            const el = document.getElementById('not-found');
            el.style.display = 'flex';
            document.getElementById('home-btn').onclick = function () {
                window.location.href = hp();
            };
        }

        if (window.location.hostname.split('.')[0] !== expectedPrefix()) {
            show404();
        } else if (encoded) {
            try {
                const url = deob(encoded);
                document.getElementById('frame').src = url;
            } catch (e) {
                show404();
            }
        } else {
            show404();
        }
    </script>
</body>

</html>
