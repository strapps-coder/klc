<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>KamaLoka.Club</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; }
        iframe { width: 100vw; height: 100vh; border: none; display: block; }
    </style>
</head>
<body>
    <iframe id="frame" allowfullscreen></iframe>
    <script>
        function deob(str) {
            const reversed = str.split('').reverse().join('');
            const padded = reversed + '='.repeat((4 - reversed.length % 4) % 4);
            return atob(padded);
        }

        function obfuscate(str) {
            return btoa(str).split('').reverse().join('').replace(/=+$/, '');
        }

        window.addEventListener('message', function(event) {
            if (event.data && event.data.url) {
                const newEncoded = obfuscate(Date.now() + '_' + event.data.url);
                history.replaceState(null, '', '#' + newEncoded);
            }
        });

        const params = window.location.hash.slice(1);
        const encoded = params.split('&')[0];

        if (encoded) {
            try {
                const decoded = deob(encoded);
                const sep = decoded.indexOf('_');
                const timestamp = parseInt(decoded.substring(0, sep), 10);
                const url = decoded.substring(sep + 1);
                if (Date.now() - timestamp > 86400000) {
                    const parts = window.location.hostname.split('.');
                    window.location.href = window.location.protocol + '//' + parts[parts.length - 2] + '.club';
                } else {
                    document.getElementById('frame').src = url;
                }
            } catch(e) {
                console.error('Failed to decode URL:', e);
            }
        }
    </script>
</body>
</html>
